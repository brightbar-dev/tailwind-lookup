<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  <title>Tailwind CSS Lookup</title>
</head>
<body>
  <div class="container">
    <header>
      <h1>Tailwind CSS Lookup</h1>
    </header>

    <div class="inspect-toggle">
      <button id="inspect-btn" class="btn btn-inspect">Inspect Element</button>
    </div>

    <div class="search-section">
      <input type="text" id="search" class="search-input" placeholder="Search class (e.g. flex, p-4, text-lg)..." autofocus>
    </div>

    <div id="results" class="results"></div>

    <div id="page-summary" class="page-summary"></div>

    <div class="cross-promo">
      <h2 class="cross-promo-heading">More from Brightbar</h2>
      <div class="cross-promo-list">
        <a href="https://chromewebstore.google.com/detail/json-viewer-pro/iodhhjpjemdfmmfffmejfnbbjbfafoac" target="_blank" class="cross-promo-item">
          <span class="cross-promo-name">JSON Viewer Pro</span>
          <span class="cross-promo-desc">Auto-format JSON with tree view and search</span>
        </a>
        <a href="https://chromewebstore.google.com/detail/cookie-devtools/pgohmdladleifefhobididhhlmjcknjl" target="_blank" class="cross-promo-item">
          <span class="cross-promo-name">Cookie DevTools</span>
          <span class="cross-promo-desc">Cookie manager with real-time monitoring</span>
        </a>
        <a href="https://chromewebstore.google.com/detail/devtools-pro/lbgjfgdjjeiajkkcppdnclmkicihehkf" target="_blank" class="cross-promo-item">
          <span class="cross-promo-name">DevTools Pro</span>
          <span class="cross-promo-desc">12 developer tools in one extension</span>
        </a>
        <a href="https://chromewebstore.google.com/detail/browser-api-client/gnfhfenegmjdjlfclcabfmajgaiaheij" target="_blank" class="cross-promo-item">
          <span class="cross-promo-name">Browser API Client</span>
          <span class="cross-promo-desc">Lightweight API client in your browser</span>
        </a>
      </div>
    </div>

    <footer>
      <span class="version">v0.2.0</span>
      <a href="#" id="options-link">Settings</a>
    </footer>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
